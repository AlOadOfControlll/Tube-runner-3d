<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Play the ultimate unblocked Tube Runner 3D game directly in your browser. Shift gravity, rotate the tunnel grid, dodge fast obstacles, and beat your high score!">
<meta name="keywords" content="tube runner 3d, tube runner, run 3, 3d running game, unblocked games">
<title>Tube Runner 3D</title>
<style>
body,html{
    margin:0;padding:0;
    overflow:hidden;
    width:100%;height:100%;
    background:#050510;
    font-family:monospace;
    color:#00ffff;user-select:none;
}
canvas{
    display:block;
    width:100%;height:100%;
}
#scoreWidget{
    position:absolute;
    top:20px;left:20px;
    z-index:10;font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px #00ffff;
}
#menuOverlay{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(5,5,20,0.95);
    display:flex;flex-direction:column;
    justify-content:center;
    align-items:center;z-index:20;
    gap:15px;text-align:center;
}
button{
    background:linear-gradient(135deg,#0044ff,#00ccff);
    border:none;border-radius:5px;
    color:#ffffff;font-weight:bold;
    padding:16px 45px;font-size:18px;
    cursor:pointer;text-transform:uppercase;
    box-shadow:0 0 15px #00ccff;
    transition:transform 0.1s;
}
button:hover{
    transform:scale(1.05);
    filter:brightness(1.1);
}
</style>
<script src="https://cloudflare.com"></script>
</head>
<body>
<div id="scoreWidget">SCORE: <span id="scoreValue">0</span></div>
<div id="menuOverlay">
    <h1 id="menuTitle" style="font-size:46px;margin:0;text-shadow:0 0 20px #00ccff;letter-spacing:2px;">TUBE RUNNER 3D</h1>
    <p style="color:#8888aa;margin:0 0 15px 0;font-size:14px;">Controls: Use A / D or Left / Right Arrow Keys to Spin the Tunnel Grid!</p>
    <button id="actionButton" onclick="triggerGameStart()">START RUN</button>
</div>
<script>
let scene, camera, renderer, tubeMesh;
let gameClock = new THREE.Clock();
let isGameRunning = false;
let currentScore = 0;
let desiredRotation = 0;
let currentRotation = 0;

let obstaclePool = [];
let gameSpeed = 45;
let unitSegmentLength = 12;
let maxSegmentsCount = 30;

function triggerGameStart() {
    document.getElementById('menuOverlay').style.display = 'none';
    if (!scene) {
        initializeGraphicsEngine();
    } else {
        flushAndResetMatch();
    }
    isGameRunning = true;
}

function initializeGraphicsEngine() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.FogExp2(0x050510, 0.015);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0x222255));
    let mainSun = new THREE.DirectionalLight(0x00ffff, 1.5);
    mainSun.position.set(0, 10, 5);
    scene.add(mainSun);

    let canvasMap = document.createElement('canvas');
    canvasMap.width = canvasMap.height = 128;
    let canvasCtx = canvasMap.getContext('2d');
    canvasCtx.fillStyle = '#0a0a28';
    canvasCtx.fillRect(0, 0, 128, 128);
    canvasCtx.strokeStyle = '#00ffff';
    canvasCtx.lineWidth = 4;
    canvasCtx.strokeRect(0, 0, 128, 128);
    
    let tubeTexture = new THREE.CanvasTexture(canvasMap);
    tubeTexture.wrapS = tubeTexture.wrapT = THREE.RepeatWrapping;
    tubeTexture.repeat.set(8, maxSegmentsCount);
    
    let tubeGeometry = new THREE.CylinderGeometry(10, 10, unitSegmentLength * maxSegmentsCount, 8, maxSegmentsCount, true);
    let tubeMaterial = new THREE.MeshStandardMaterial({ map: tubeTexture, side: THREE.BackSide, roughness: 0.2 });
    
    tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
    tubeMesh.rotation.x = Math.PI / 2;
    tubeMesh.position.z = -(unitSegmentLength * maxSegmentsCount) / 2;
    scene.add(tubeMesh);

    camera.position.set(0, -7.5, 0);

    window.addEventListener('keydown', (e) => {
        if (!isGameRunning) return;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') desiredRotation -= Math.PI / 4;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') desiredRotation += Math.PI / 4;
    });
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    flushAndResetMatch();
    executeCoreRenderTick();
}

function flushAndResetMatch() {
    currentScore = 0;
    gameSpeed = 45;
    desiredRotation = currentRotation = 0;
    tubeMesh.rotation.y = 0;
    document.getElementById('scoreValue').innerText = currentScore;
    
    obstaclePool.forEach(obj => scene.remove(obj));
    obstaclePool = [];
    
    for (let i = 0; i < 8; i++) {
        instantiateObstacleNode(-80 - (i * 35));
    }
}

function instantiateObstacleNode(zCoordinates) {
    let obstacleGeometry = new THREE.BoxGeometry(4.5, 2, 4);
    let obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0x660011, roughness: 0.3 });
    let blockMesh = new THREE.Mesh(obstacleGeometry, obstacleMaterial);
    
    let targetLane = Math.floor(Math.random() * 8);
    let radialAngle = targetLane * (Math.PI / 4);
    
    blockMesh.position.set(Math.sin(radialAngle) * 8.8, Math.cos(radialAngle) * 8.8, zCoordinates);
    blockMesh.rotation.z = -radialAngle;
    
    scene.add(blockMesh);
    obstaclePool.push(blockMesh);
}

function executeCoreRenderTick() {
    requestAnimationFrame(executeCoreRenderTick);
    let frameDelta = gameClock.getDelta();
    if (frameDelta > 0.1) frameDelta = 0.1;

    if (isGameRunning) {
        currentScore += Math.floor(frameDelta * 15);
        document.getElementById('scoreValue').innerText = currentScore;
        gameSpeed += frameDelta * 0.4;

        currentRotation += (desiredRotation - currentRotation) * 12 * frameDelta;
        tubeMesh.rotation.y = currentRotation;

        for (let i = obstaclePool.length - 1; i >= 0; i--) {
            let activeBlock = obstaclePool[i];
            activeBlock.position.z += gameSpeed * frameDelta;

            let localizedVector = activeBlock.position.clone().applyAxisAngle(new THREE.Vector3(0, 0, 1), currentRotation);
            let absoluteDistance = localizedVector.distanceTo(new THREE.Vector3(0, -7.5, 0));

            if (absoluteDistance < 2.3 && Math.abs(activeBlock.position.z) < 2) {
                isGameRunning = false;
                document.getElementById('menuOverlay').style.display = 'flex';
                document.getElementById('menuTitle').innerText = "CRASHED!";
                document.getElementById('actionButton').innerText = "RUN AGAIN";
                return;
            }

            if (activeBlock.position.z > 10) {
                activeBlock.position.z = -260;
                let targetLane = Math.floor(Math.random() * 8);
                let radialAngle = targetLane * (Math.PI / 4);
                activeBlock.position.set(Math.sin(radialAngle) * 8.8, Math.cos(radialAngle) * 8.8, -260);
                activeBlock.rotation.z = -radialAngle;
            }
        }
    }
    if (scene && camera) renderer.render(scene, camera);
}
</script>
</body>
</html>
