<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
:root{
  --c1:#00f0ff;--c2:#ff00cc;--c3:#00ff88;--c4:#ffee00;
  --bg:#04000f;--panel:rgba(4,0,20,0.94);
  --gb:0 0 24px #00f0ff88,0 0 48px #00f0ff22;
  --gp:0 0 24px #ff00cc88,0 0 48px #ff00cc22;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;overflow:hidden;width:100vw;height:100vh;color:#fff}
canvas#gc{position:fixed;top:0;left:0;z-index:1}

/* ─── SCREENS ─── */
.screen{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center}
.screen.hidden{display:none!important}

/* ─── MAIN MENU ─── */
#mainMenu{background:transparent}
#menuBg{position:fixed;inset:0;z-index:9;pointer-events:none}
#menuCanvas{width:100%;height:100%}
.menu-panel{
  position:relative;z-index:11;
  background:rgba(4,0,25,0.82);
  backdrop-filter:blur(18px);
  border:1px solid #00f0ff33;
  border-radius:20px;
  padding:36px 40px 32px;
  width:min(440px,90vw);
  box-shadow:0 0 80px #00f0ff18,inset 0 1px 0 #ffffff18;
}
.menu-panel::before{
  content:'';position:absolute;inset:-1px;border-radius:20px;
  background:linear-gradient(135deg,#00f0ff44 0%,transparent 40%,transparent 60%,#ff00cc44 100%);
  z-index:-1;pointer-events:none;
}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo{
  font-family:'Orbitron',monospace;font-size:clamp(2rem,7vw,3.2rem);font-weight:900;
  background:linear-gradient(135deg,#00f0ff,#ff00cc,#00ff88);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:5px;filter:drop-shadow(0 0 20px #00f0ffaa);display:block;
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px #00f0ffaa)}50%{filter:drop-shadow(0 0 35px #ff00ccaa)}}
.sub{font-size:.7rem;letter-spacing:5px;color:#ffffff44;text-transform:uppercase;margin-top:4px}

/* ─── GENERIC PANEL ─── */
.panel{
  background:var(--panel);backdrop-filter:blur(14px);
  border:1px solid #00f0ff28;border-radius:16px;padding:32px;
  width:min(500px,92vw);max-height:90vh;overflow-y:auto;
  box-shadow:0 0 60px #00f0ff14;position:relative;
  scrollbar-width:thin;scrollbar-color:var(--c1) transparent;
}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:var(--c1);border-radius:2px}
.panel-title{
  font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;
  margin-bottom:22px;background:linear-gradient(90deg,var(--c1),var(--c2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ─── BUTTONS ─── */
.btn{
  display:block;width:100%;padding:13px 18px;margin:8px 0;
  border:none;border-radius:10px;font-family:'Orbitron',monospace;
  font-size:.85rem;font-weight:700;letter-spacing:2px;cursor:pointer;
  transition:all .18s cubic-bezier(.4,0,.2,1);text-transform:uppercase;
  position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent)}
.btn-play{
  background:linear-gradient(135deg,#00a8d4,#0060ff);color:#fff;
  box-shadow:var(--gb);font-size:1rem;padding:16px;
}
.btn-play:hover{transform:translateY(-3px);box-shadow:0 0 40px #00f0ff,0 0 80px #00f0ff44}
.btn-shop{background:linear-gradient(135deg,#aa0077,#ff00aa);color:#fff;box-shadow:var(--gp)}
.btn-shop:hover{transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--c1);border:1px solid #00f0ff44}
.btn-ghost:hover{background:#00f0ff0e;border-color:var(--c1)}
.btn-green{background:linear-gradient(135deg,#006644,#00ff88);color:#001a0e;box-shadow:0 0 20px #00ff8866}
.btn-warn{background:linear-gradient(135deg,#662200,#ff4400);color:#fff}
.btn-sm{width:auto;display:inline-block;padding:7px 14px;font-size:.7rem;margin:3px}
.btn:active{transform:scale(.97)!important}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}

/* ─── INPUT ─── */
.igrp{margin:10px 0}
.igrp label{display:block;font-size:.7rem;letter-spacing:2px;color:var(--c1);margin-bottom:5px;text-transform:uppercase}
.igrp input,.igrp select{
  width:100%;background:#00001a;border:1px solid #00f0ff33;border-radius:7px;
  color:#fff;padding:10px 13px;font-family:'Rajdhani',sans-serif;font-size:.95rem;outline:none;
  transition:border-color .2s;
}
.igrp input:focus,.igrp select:focus{border-color:var(--c1);box-shadow:0 0 10px #00f0ff22}

/* ─── TABS ─── */
.tabs{display:flex;background:#00000a;border-radius:8px;padding:3px;gap:3px;margin-bottom:18px}
.tab{
  flex:1;padding:8px;text-align:center;cursor:pointer;border-radius:6px;
  font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:1px;
  color:#ffffff55;transition:all .2s;
}
.tab.active{background:linear-gradient(135deg,#00f0ff22,#ff00cc11);color:var(--c1);box-shadow:inset 0 0 12px #00f0ff15}

/* ─── SHOP ─── */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.shop-item{
  background:#00000e;border:1px solid #00f0ff18;border-radius:12px;
  padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;
}
.shop-item::before{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;background:linear-gradient(135deg,#00f0ff08,#ff00cc08);transition:opacity .2s}
.shop-item:hover::before{opacity:1}
.shop-item:hover{border-color:#00f0ff44;transform:translateY(-2px)}
.shop-item.owned{border-color:#00ff8844}
.shop-item.equipped{border-color:var(--c3);box-shadow:0 0 16px #00ff8822}
.si-preview{width:100%;height:70px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;position:relative}
.si-preview canvas{border-radius:6px}
.si-name{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--c1);margin-bottom:3px;letter-spacing:1px}
.si-desc{font-size:.7rem;color:#ffffff55;margin-bottom:8px;line-height:1.3}
.si-badge{position:absolute;top:6px;right:6px;font-size:.55rem;font-family:'Orbitron',monospace;padding:2px 6px;border-radius:4px;letter-spacing:1px}
.badge-new{background:#ff00cc44;color:var(--c2);border:1px solid var(--c2)}
.badge-rare{background:#ffee0033;color:var(--c4);border:1px solid var(--c4)}
.badge-epic{background:#aa00ff33;color:#cc44ff;border:1px solid #cc44ff}

/* ─── COIN DISPLAY ─── */
.coin-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#00001a;border:1px solid #ffee0033;border-radius:10px;
  padding:10px 20px;margin-bottom:16px;
  font-family:'Orbitron',monospace;font-size:1rem;color:var(--c4);
  box-shadow:0 0 12px #ffee0011;
}

/* ─── HUD ─── */
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}
#hud.hidden{display:none}
.h-score{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;
  text-align:center;color:#fff;text-shadow:0 0 20px var(--c1);
}
.h-score-lbl{font-size:.6rem;color:var(--c1);letter-spacing:3px;display:block;margin-bottom:2px}
.h-coins{position:absolute;top:18px;right:20px;font-family:'Orbitron',monospace;font-size:.9rem;color:var(--c4);text-shadow:0 0 10px var(--c4)}
.h-lives{position:absolute;top:18px;left:20px;font-family:'Orbitron',monospace;font-size:1rem;letter-spacing:2px}
.h-speed{position:absolute;bottom:18px;left:20px;font-family:'Orbitron',monospace;font-size:.7rem;color:#ffffff55}
.h-ability{
  position:absolute;bottom:18px;right:20px;
  font-family:'Orbitron',monospace;font-size:.7rem;
  color:var(--c3);letter-spacing:1px;text-align:right;
}
.h-theme{
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:.6rem;color:#ffffff22;letter-spacing:3px;
}

/* ─── PAUSE ─── */
#pauseScreen{background:rgba(2,0,12,.92);backdrop-filter:blur(8px)}

/* ─── KEYBINDS ─── */
.kb-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #ffffff0a;font-size:.9rem;color:#bbb}
.kb-btn{
  background:#00001a;border:1px solid var(--c1);color:var(--c1);
  border-radius:5px;padding:4px 14px;font-family:'Orbitron',monospace;
  font-size:.7rem;cursor:pointer;min-width:64px;text-align:center;
}
.kb-btn.listening{background:var(--c2);border-color:var(--c2);color:#fff;animation:kbpulse .5s infinite}
@keyframes kbpulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── LB ─── */
.lb-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #ffffff0a;font-size:.9rem}
.lb-rank{font-family:'Orbitron',monospace;color:var(--c1);min-width:30px;font-size:.8rem}
.lb-name{flex:1;color:#ddd}
.lb-score{font-family:'Orbitron',monospace;color:var(--c4);font-size:.85rem}
.lb-row.me{background:#00f0ff09;border-radius:6px;padding:9px 8px}

/* ─── GAME OVER ─── */
.go-stat{text-align:center;margin:16px 0}
.go-lbl{font-size:.65rem;color:var(--c1);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.go-val{font-family:'Orbitron',monospace;font-size:2.6rem;font-weight:900;color:#fff}
.go-sub{font-size:.8rem;color:var(--c3);margin-top:3px}

/* ─── NOTIF ─── */
#notif{
  position:fixed;top:72px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--c3);color:var(--c3);
  padding:9px 22px;border-radius:8px;font-family:'Orbitron',monospace;font-size:.72rem;
  z-index:200;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;
}
#notif.show{opacity:1}

/* ─── MOBILE ─── */
#mctrl{position:fixed;bottom:0;left:0;right:0;z-index:6;display:none;padding:10px 20px 22px;justify-content:space-between;pointer-events:none}
#mctrl.on{display:flex}
.mc{width:68px;height:68px;border-radius:50%;background:rgba(0,240,255,.12);border:2px solid var(--c1);color:var(--c1);font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;user-select:none;touch-action:none;font-weight:700}
.mc-mid{display:flex;gap:14px;align-items:flex-end}

/* ─── ABILITY BAR ─── */
.ab-bar{
  position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;
}
.ab-slot{
  width:44px;height:44px;border-radius:8px;
  border:1px solid #00f0ff33;background:#00000a;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;position:relative;
}
.ab-slot .ab-cd{
  position:absolute;inset:0;border-radius:8px;
  background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:.6rem;color:var(--c1);
}

@media(max-width:540px){.shop-grid{grid-template-columns:1fr}.logo{font-size:1.8rem}}

/* section dividers */
.sdiv{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--c1);letter-spacing:3px;text-transform:uppercase;opacity:.6;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sdiv::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#00f0ff33,transparent)}
</style>
</head>
<body>

<!-- BACKGROUND CANVAS (menu) -->
<canvas id="menuCanvas" style="position:fixed;inset:0;z-index:0;width:100%;height:100%;pointer-events:none"></canvas>
<!-- GAME CANVAS -->
<canvas id="gc" style="display:none"></canvas>
<!-- HUD -->
<div id="hud" class="hidden">
  <div class="h-lives" id="hLives">❤️❤️❤️</div>
  <div class="h-score"><span class="h-score-lbl">DISTANCE</span><span id="hScore">0</span></div>
  <div class="h-coins" id="hCoins">⚡ 0</div>
  <div class="h-speed" id="hSpeed">SPEED ×1.0</div>
  <div class="h-theme" id="hTheme"></div>
  <div class="h-ability" id="hAbility"></div>
  <div class="ab-bar" id="abBar"></div>
</div>
<div id="notif"></div>

<!-- ═══ MAIN MENU ═══ -->
<div id="mainMenu" class="screen">
  <div class="menu-panel">
    <div class="logo-wrap">
      <span class="logo">VOID RUNNER</span>
      <div class="sub">Infinite · 3D · Endless</div>
    </div>
    <div class="igrp"><label>Nickname</label><input id="nnInput" maxlength="16" placeholder="Enter your name…"></div>
    <button class="btn btn-play" id="btnPlay">▶ PLAY NOW</button>
    <button class="btn btn-shop" id="btnShop">🛒 SHOP</button>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btnLB">🏆 RANKS</button>
      <button class="btn btn-ghost" id="btnSet">⚙ SETTINGS</button>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:.7rem;color:#ffffff22;letter-spacing:1px">
      ←→ / AD · SPACE jump · S slide · ESC pause
    </div>
  </div>
</div>

<!-- ═══ PAUSE ═══ -->
<div id="pauseScreen" class="screen hidden">
  <div class="panel" style="max-width:380px">
    <div class="panel-title" style="text-align:center;font-size:1.6rem">⏸ PAUSED</div>
    <div class="tabs">
      <div class="tab active" onclick="ptab('game')">GAME</div>
      <div class="tab" onclick="ptab('keys')">KEYS</div>
    </div>
    <div id="ptGame">
      <button class="btn btn-play" id="btnResume">▶ RESUME</button>
      <button class="btn btn-ghost" id="btnQuit">⬅ MAIN MENU</button>
    </div>
    <div id="ptKeys" style="display:none">
      <div class="sdiv">Keybinds</div>
      <div id="kbList"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="resetKB()">Reset Defaults</button>
    </div>
  </div>
</div>

<!-- ═══ GAME OVER ═══ -->
<div id="goScreen" class="screen hidden">
  <div class="panel" style="max-width:380px">
    <div class="panel-title" style="text-align:center;font-size:1.6rem;background:linear-gradient(90deg,#ff0044,#ff00cc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">☠ GAME OVER</div>
    <div class="go-stat"><div class="go-lbl">Distance</div><div class="go-val" id="goVal">0</div><div class="go-sub" id="goBest"></div></div>
    <div class="go-stat"><div class="go-lbl">Energy Earned</div><div class="go-val" style="font-size:1.8rem;color:var(--c4)" id="goCoins">+0</div></div>
    <button class="btn btn-play" id="btnRestart">↺ PLAY AGAIN</button>
    <button class="btn btn-ghost" id="btnGoMenu">⬅ MENU</button>
  </div>
</div>

<!-- ═══ SHOP ═══ -->
<div id="shopScreen" class="screen hidden">
  <div class="panel">
    <div class="panel-title">🛒 SHOP</div>
    <div class="coin-bar">⚡ <span id="shopCoins">0</span> ENERGY</div>
    <div class="tabs">
      <div class="tab active" onclick="stab('skins')">SKINS</div>
      <div class="tab" onclick="stab('trails')">TRAILS</div>
      <div class="tab" onclick="stab('abilities')">ABILITIES</div>
    </div>
    <div id="shopContent"></div>
    <button class="btn btn-ghost" style="margin-top:16px" id="btnCloseShop">← BACK</button>
  </div>
</div>

<!-- ═══ LEADERBOARD ═══ -->
<div id="lbScreen" class="screen hidden">
  <div class="panel" style="max-width:420px">
    <div class="panel-title" style="background:linear-gradient(90deg,var(--c4),#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">🏆 LEADERBOARD</div>
    <div id="lbContent"><div style="text-align:center;color:#fff3;padding:40px">Loading…</div></div>
    <button class="btn btn-ghost" style="margin-top:16px" id="btnCloseLB">← BACK</button>
  </div>
</div>

<!-- ═══ SETTINGS ═══ -->
<div id="setScreen" class="screen hidden">
  <div class="panel">
    <div class="panel-title">⚙ SETTINGS</div>
    <div class="igrp"><label>Nickname</label><input id="setNN" maxlength="16" placeholder="Your name…"></div>
    <div class="igrp"><label>Graphics</label>
      <select id="setGfx"><option value="low">Low — Max FPS</option><option value="med" selected>Medium</option><option value="high">High — Best Visuals</option></select>
    </div>
    <div class="igrp"><label>Tunnel Theme</label>
      <select id="setTheme"><option value="auto">Auto — Random Levels</option><option value="neon">Neon Void</option><option value="fire">Fire Storm</option><option value="ice">Cryo Void</option><option value="purple">Phantom</option><option value="gold">Golden Rush</option></select>
    </div>
    <div class="igrp" style="display:flex;align-items:center;justify-content:space-between;flex-direction:row">
      <label style="margin:0">Screen Shake</label>
      <input type="checkbox" id="setShake" checked style="width:auto;accent-color:var(--c1);transform:scale(1.3)">
    </div>
    <div class="sdiv">Keybinds</div>
    <div id="kbSet"></div>
    <button class="btn btn-ghost btn-sm" onclick="resetKB()" style="margin-top:8px">Reset Defaults</button>
    <button class="btn btn-play" id="btnSaveSet" style="margin-top:18px">💾 SAVE</button>
    <button class="btn btn-ghost" id="btnCloseSet">← BACK</button>
  </div>
</div>

<!-- Mobile controls -->
<div id="mctrl">
  <div class="mc" id="mcL">◀</div>
  <div class="mc-mid">
    <div class="mc" id="mcS">▼</div>
    <div class="mc" id="mcJ">▲</div>
  </div>
  <div class="mc" id="mcR">▶</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ════════════════════════════════════════
//  SAVE
// ════════════════════════════════════════
const SK='vr2_save';
let S={
  nickname:'Runner',coins:0,best:0,
  ownedSkins:['default'],ownedTrails:['none'],ownedAbilities:[],
  skin:'default',trail:'none',ability:null,
  settings:{gfx:'med',theme:'auto',shake:true},
  kb:{left:'ArrowLeft',right:'ArrowRight',jump:' ',slide:'ArrowDown',pause:'Escape',ability:'q'}
};
function lS(){try{const d=localStorage.getItem(SK);if(d)S={...S,...JSON.parse(d)}}catch(e){}}
function wS(){try{localStorage.setItem(SK,JSON.stringify(S))}catch(e){}}
lS();

// ════════════════════════════════════════
//  NOTIFICATION
// ════════════════════════════════════════
function notify(msg,col='var(--c3)'){
  const n=document.getElementById('notif');
  n.textContent=msg;n.style.borderColor=col;n.style.color=col;
  n.classList.add('show');clearTimeout(n._t);
  n._t=setTimeout(()=>n.classList.remove('show'),2600);
}

// ════════════════════════════════════════
//  LEADERBOARD
// ════════════════════════════════════════
let LB=[];
async function fetchLB(){try{const r=localStorage.getItem('vr2_lb');LB=r?JSON.parse(r):[]}catch(e){LB=[]}}
async function submitScore(name,score){
  await fetchLB();
  LB=LB.filter(e=>e.name!==name);
  LB.push({name,score,d:Date.now()});
  LB.sort((a,b)=>b.score-a.score);LB=LB.slice(0,100);
  try{localStorage.setItem('vr2_lb',JSON.stringify(LB))}catch(e){}
}

// ════════════════════════════════════════
//  SKIN DEFINITIONS
// ════════════════════════════════════════
const SKINS=[
  {id:'default',name:'VOID',desc:'The classic neon sphere',price:0,color:0x00ccff,emissive:0x004455,glow:0x00f0ff,type:'solid'},
  {id:'crimson',name:'CRIMSON',desc:'Blazing red energy',price:400,color:0xff1133,emissive:0x440011,glow:0xff0044,type:'solid',badge:'new'},
  {id:'phantom',name:'PHANTOM',desc:'Ghost energy core',price:600,color:0x00ff88,emissive:0x003322,glow:0x00ff88,type:'solid'},
  {id:'solar',name:'SOLAR',desc:'Golden plasma',price:900,color:0xffcc00,emissive:0x443300,glow:0xffcc00,type:'solid',badge:'rare'},
  {id:'spectre',name:'SPECTRE',desc:'White void light',price:1200,color:0xeeeeff,emissive:0x222233,glow:0xaaaaff,type:'solid'},
  {id:'inferno',name:'INFERNO',desc:'Molten fire core',price:1500,color:0xff6600,emissive:0x331100,glow:0xff4400,type:'solid',badge:'rare'},

const KB_DEFAULTS={left:'ArrowLeft',right:'ArrowRight',jump:' ',slide:'ArrowDown',pause:'Escape',ability:'q'};
const KB_LABELS={left:'Move Left',right:'Move Right',jump:'Jump',slide:'Slide',pause:'Pause',ability:'Use Ability'};
let listening=null;

function kname(k){
  if(k===' ')return'SPACE';
  const m={ArrowLeft:'←',ArrowRight:'→',ArrowDown:'↓',ArrowUp:'↑',Escape:'ESC'};
  return m[k]||k.toUpperCase();
}
function renderKB(id){
  const c=document.getElementById(id);if(!c)return;c.innerHTML='';
  for(const[a,lbl]of Object.entries(KB_LABELS)){
    const row=document.createElement('div');row.className='kb-row';
    row.innerHTML=`<span>${lbl}</span><button class="kb-btn" id="kb_${id}_${a}">${kname(S.kb[a])}</button>`;
    row.querySelector('button').addEventListener('click',()=>startListen(a,id));
    c.appendChild(row);
  }
}
function startListen(action,id){
  if(listening){const o=document.getElementById(`kb_${id}_${listening}`);if(o)o.classList.remove('listening')}
  listening=action;
  const b=document.getElementById(`kb_${id}_${action}`);
  if(b){b.classList.add('listening');b.textContent='…'}
}
function resetKB(){S.kb={...KB_DEFAULTS};wS();renderKB('kbList');renderKB('kbSet');notify('Keys reset!')}
document.addEventListener('keydown',e=>{
  if(listening){S.kb[listening]=e.key;wS();listening=null;renderKB('kbList');renderKB('kbSet');return}
  if(!GAME.running)return;
  const k=S.kb;
  if(e.key===k.pause){e.preventDefault();togglePause();return}
  if(e.key===k.left||e.key==='a'){e.preventDefault();moveLane(-1)}
  if(e.key===k.right||e.key==='d'){e.preventDefault();moveLane(1)}
  if(e.key===k.jump||e.key==='ArrowUp'||e.key==='w'){e.preventDefault();doJump()}
  if(e.key===k.slide||e.key==='s'){e.preventDefault();doSlide()}
  if(e.key===k.ability||e.key==='q'){e.preventDefault();useAbility()}
});
document.addEventListener('keyup',e=>{
  if(e.key===S.kb.left||e.key==='a')KEYS.left=false;
  if(e.key===S.kb.right||e.key==='d')KEYS.right=false;
});
const KEYS={left:false,right:false};

const previewRenderers=[];
function buildSkinPreview(canvas,skinId){
  const skin=SKINS.find(s=>s.id===skinId)||SKINS[0];
  const pr=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  pr.setSize(canvas.width,canvas.height);
  pr.setClearColor(0x000000,0);
  const ps=new THREE.Scene();
  const pc=new THREE.PerspectiveCamera(50,1,0.1,10);
  pc.position.set(0,0,3);
  ps.add(new THREE.AmbientLight(0xffffff,0.5));
  const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(2,3,2);ps.add(dl);
  const pl=new THREE.PointLight(skin.glow,2,6);pl.position.set(-1,1,1);ps.add(pl);

  // Build the sphere player
  const geo=new THREE.SphereGeometry(0.65,32,24);
  const mat=new THREE.MeshPhongMaterial({
    color:skin.color,emissive:skin.emissive||0x000000,emissiveIntensity:0.6,
    shininess:180,specular:0xffffff
  });
  const sphere=new THREE.Mesh(geo,mat);

  // Equator ring
  const rg=new THREE.TorusGeometry(0.68,0.04,8,32);
  const rm=new THREE.MeshPhongMaterial({color:skin.glow,emissive:skin.glow,emissiveIntensity:1});
  const ring=new THREE.Mesh(rg,rm);ring.rotation.x=Math.PI/2;

  // Core glow sphere
  const cg=new THREE.SphereGeometry(0.35,16,12);
  const cm=new THREE.MeshPhongMaterial({color:skin.glow,emissive:skin.glow,emissiveIntensity:2,transparent:true,opacity:0.35});
  const core=new THREE.Mesh(cg,cm);

  const grp=new THREE.Group();grp.add(sphere,ring,core);ps.add(grp);
  let t=0;
  const id=setInterval(()=>{
    t+=0.02;
    if(skin.id==='rainbow'){
      const h=t*0.3%1;sphere.material.color.setHSL(h,1,.5);pl.color.setHSL(h,1,.6)}
    grp.rotation.y=t;grp.rotation.x=Math.sin(t*0.7)*0.2;
    pr.render(ps,pc);
  },1000/30);
  previewRenderers.push(id);
}

function buildTrailPreview(canvas,trailId){
  const trail=TRAILS.find(t=>t.id===trailId)||TRAILS[0];
  const pr=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  pr.setSize(canvas.width,canvas.height);pr.setClearColor(0,0);
  const ps=new THREE.Scene();
  const pc=new THREE.PerspectiveCamera(50,1,0.1,10);pc.position.set(0,0,3);
  ps.add(new THREE.AmbientLight(0xffffff,0.4));
  const col=trail.color||0x00f0ff;
  const pl=new THREE.PointLight(col,2,5);pl.position.set(0,0,1);ps.add(pl);
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(0.5,24,18),new THREE.MeshPhongMaterial({color:0x00ccff,emissive:0x004455,emissiveIntensity:0.5,shininess:120}));
  ps.add(sphere);
  // Trail particles
  const pts=[];
  for(let i=0;i<8;i++){
    const tc=trail.id==='rainbow_t'?new THREE.Color().setHSL(i/8,1,.5):new THREE.Color(col);
    const m=new THREE.Mesh(new THREE.SphereGeometry(0.1-i*0.01,8,6),new THREE.MeshPhongMaterial({color:tc,emissive:tc,emissiveIntensity:1,transparent:true,opacity:1-i*0.1}));
    m.position.set(0,0,-(i*0.15));ps.add(m);pts.push(m);
  }
  let t=0;
  const id=setInterval(()=>{
    t+=0.02;sphere.rotation.y=t;
    pts.forEach((p,i)=>{p.position.y=Math.sin(t*2+i*0.5)*0.1;if(trail.id==='rainbow_t')p.material.color.setHSL((t*0.5+i/8)%1,1,.5)});
    pr.render(ps,pc);
  },1000/30);
  previewRenderers.push(id);
}

function buildAbilityPreview(canvas,abilityId){
  const ab=ABILITIES.find(a=>a.id===abilityId)||ABILITIES[0];
  const pr=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  pr.setSize(canvas.width,canvas.height);pr.setClearColor(0,0);
  const ps=new THREE.Scene();
  const pc=new THREE.PerspectiveCamera(50,1,0.1,10);pc.position.set(0,0,3);
  ps.add(new THREE.AmbientLight(0xffffff,0.5));
  const colors={magnet:0x00aaff,shield:0x00ff88,boost:0xffee00,ghost:0xcc44ff,slow:0x00ccff,doubler:0xffaa00,tiny:0x44ff88};
  const c=colors[ab.id]||0x00f0ff;
  ps.add(new THREE.PointLight(c,2.5,6));
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(0.55,24,18),new THREE.MeshPhongMaterial({color:c,emissive:c,emissiveIntensity:0.5,shininess:200}));
  const icon=new THREE.Mesh(new THREE.TorusGeometry(0.7,0.04,8,32),new THREE.MeshPhongMaterial({color:c,emissive:c,emissiveIntensity:1}));
  ps.add(sphere);ps.add(icon);
  let t=0;
  const id=setInterval(()=>{t+=0.02;sphere.rotation.y=t*1.5;icon.rotation.z=t;icon.rotation.x=Math.sin(t)*0.3;pr.render(ps,pc)},1000/30);
  previewRenderers.push(id);
}

function clearPreviews(){previewRenderers.forEach(id=>clearInterval(id));previewRenderers.length=0}

let curTab='skins';

  curTab=t;

function renderShop(){
  clearPreviews();
  document.getElementById('shopCoins').textContent=S.coins;
  const c=document.getElementById('shopContent');
  let html='<div class="shop-grid">';

  if(curTab==='skins'){
    SKINS.forEach(sk=>{
      const owned=S.ownedSkins.includes(sk.id);
      const equipped=S.skin===sk.id;
      const canAfford=S.coins>=sk.price;
      let action=owned
        ?(equipped?`<div style="color:var(--c3);font-size:.7rem;font-family:'Orbitron',monospace">✓ EQUIPPED</div>`:`<button class="btn btn-ghost btn-sm" onclick="equip('${sk.id}','skin')">EQUIP</button>`)
        :`<button class="btn btn-play btn-sm" onclick="buy('${sk.id}','skin')" ${!canAfford?'disabled':''}>⚡${sk.price}</button>`;
      html+=`<div class="shop-item${owned?' owned':''}${equipped?' equipped':''}">
        ${sk.badge?`<div class="si-badge badge-${sk.badge}">${sk.badge.toUpperCase()}</div>`:''}
        <div class="si-preview"><canvas id="prev_${sk.id}" width="60" height="60"></canvas></div>
        <div class="si-name">${sk.name}</div>
        <div class="si-desc">${sk.desc}</div>
        ${action}</div>`;
    });
  } else if(curTab==='trails'){
    TRAILS.forEach(tr=>{
      const owned=S.ownedTrails.includes(tr.id);
      const equipped=S.trail===tr.id;
      const canAfford=S.coins>=tr.price;
      let action=owned
        ?(equipped?`<div style="color:var(--c3);font-size:.7rem;font-family:'Orbitron',monospace">✓ EQUIPPED</div>`:`<button class="btn btn-ghost btn-sm" onclick="equip('${tr.id}','trail')">EQUIP</button>`)
        :`<button class="btn btn-play btn-sm" onclick="buy('${tr.id}','trail')" ${!canAfford?'disabled':''}>⚡${tr.price}</button>`;
      html+=`<div class="shop-item${owned?' owned':''}${equipped?' equipped':''}">
        ${tr.badge?`<div class="si-badge badge-${tr.badge}">${tr.badge.toUpperCase()}</div>`:''}
        <div class="si-preview"><canvas id="prev_${tr.id}" width="60" height="60"></canvas></div>
        <div class="si-name">${tr.name}</div>
        <div class="si-desc">${tr.desc}</div>
        ${action}</div>`;
    });
  } else {
    ABILITIES.forEach(ab=>{
      const owned=S.ownedAbilities.includes(ab.id);
      const equipped=S.ability===ab.id;
      const canAfford=S.coins>=ab.price;
      let action=owned
        ?(equipped?`<div style="color:var(--c3);font-size:.7rem;font-family:'Orbitron',monospace">✓ EQUIPPED</div>`:`<button class="btn btn-ghost btn-sm" onclick="equip('${ab.id}','ability')">EQUIP</button>`)
        :`<button class="btn btn-green btn-sm" onclick="buy('${ab.id}','ability')" ${!canAfford?'disabled':''}>⚡${ab.price}</button>`;
      html+=`<div class="shop-item${owned?' owned':''}${equipped?' equipped':''}">
        ${ab.badge?`<div class="si-badge badge-${ab.badge}">${ab.badge.toUpperCase()}</div>`:''}
        <div class="si-preview"><canvas id="prev_${ab.id}" width="60" height="60"></canvas></div>
        <div class="si-name">${ab.name}</div>
        <div class="si-desc">${ab.desc} · CD:${ab.cd}s</div>
        ${action}</div>`;
    });
  }
  html+='</div>';
  c.innerHTML=html;

  // Boot preview renderers
  requestAnimationFrame(()=>{
    if(curTab==='skins') SKINS.forEach(sk=>{const cv=document.getElementById(`prev_${sk.id}`);if(cv)buildSkinPreview(cv,sk.id)});
    else if(curTab==='trails') TRAILS.forEach(tr=>{const cv=document.getElementById(`prev_${tr.id}`);if(cv)buildTrailPreview(cv,tr.id)});
    else ABILITIES.forEach(ab=>{const cv=document.getElementById(`prev_${ab.id}`);if(cv)buildAbilityPreview(cv,ab.id)});
  });
}

function buy(id,type){
  const list=type==='skin'?SKINS:type==='trail'?TRAILS:ABILITIES;
  const item=list.find(i=>i.id===id);
  if(!item||S.coins<item.price){notify('Not enough energy!','var(--c2)');return}
  S.coins-=item.price;
  if(type==='skin'){S.ownedSkins.push(id);S.skin=id}
  else if(type==='trail'){S.ownedTrails.push(id);S.trail=id}
  else{S.ownedAbilities.push(id);S.ability=id}
  wS();renderShop();notify(`Unlocked ${item.name}!`);
}
function equip(id,type){
  if(type==='skin')S.skin=id;
  else if(type==='trail')S.trail=id;
  else S.ability=id;
  wS();renderShop();
}

function buildMenuTunnelSeg(z,sc){
  const T=TUNNEL_THEMES[0];
  const g=new THREE.Group();
  // Floor
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(9,18),new THREE.MeshPhongMaterial({color:0x040010,emissive:0x080822,emissiveIntensity:0.4,shininess:120}));
  floor.rotation.x=-Math.PI/2;floor.position.z=-9;g.add(floor);
  // Wall strips
  [-4.5,4.5].forEach(wx=>{
    const wall=new THREE.Mesh(new THREE.PlaneGeometry(18,7),new THREE.MeshPhongMaterial({color:0x060015,emissive:T.tunnel,emissiveIntensity:0.04}));
    wall.rotation.y=wx>0?-Math.PI/2:Math.PI/2;wall.position.set(wx,3.5,-9);g.add(wall);
    const strip=new THREE.Mesh(new THREE.BoxGeometry(0.07,7,18),new THREE.MeshPhongMaterial({color:T.tunnel,emissive:T.tunnel,emissiveIntensity:1}));
    strip.position.set(wx*0.96,3.5,-9);g.add(strip);
  });
  // Ceiling
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(9,18),new THREE.MeshPhongMaterial({color:0x040010,emissive:T.accent,emissiveIntensity:0.03}));
  ceil.rotation.x=Math.PI/2;ceil.position.set(0,7,-9);g.add(ceil);

function menuLoop(now){

function buildTunnel(){
  segPool=[];
  for(let i=0;i<SEG_N;i++)segPool.push(createSeg(-i*SEG_LEN));
}

function createSeg(z){
  const T=THEME;
  const g=new THREE.Group();

  // Tiled floor with grid pattern using canvas texture
  const floorTex=makeGridTex(T.tunnel);
  const floorGeo=new THREE.PlaneGeometry(9,SEG_LEN,1,1);
  const floorMat=new THREE.MeshPhongMaterial({color:T.floor,emissive:new THREE.Color(T.tunnel).multiplyScalar(0.08),map:floorTex,shininess:100});
  const floor=new THREE.Mesh(floorGeo,floorMat);
  floor.rotation.x=-Math.PI/2;floor.position.z=-SEG_LEN/2;g.add(floor);

  // Lane dividers
  [-LANE_W/2,LANE_W/2].forEach(lx=>{
    const ld=new THREE.Mesh(new THREE.PlaneGeometry(0.04,SEG_LEN),new THREE.MeshPhongMaterial({color:T.tunnel,emissive:T.tunnel,emissiveIntensity:0.8}));
    ld.rotation.x=-Math.PI/2;ld.position.set(lx,0.01,-SEG_LEN/2);g.add(ld);
  });

  // Walls
  const wallH=6;
  [-4.5,4.5].forEach(wx=>{
    const wallTex=makeWallTex(T.tunnel);
    const wm=new THREE.MeshPhongMaterial({color:new THREE.Color(T.floor).addScalar(0.02),emissive:new THREE.Color(T.tunnel).multiplyScalar(0.06),map:wallTex,shininess:60});
    const wall=new THREE.Mesh(new THREE.PlaneGeometry(SEG_LEN,wallH),wm);
    wall.rotation.y=wx>0?-Math.PI/2:Math.PI/2;
    wall.position.set(wx,wallH/2,-SEG_LEN/2);g.add(wall);
    // Edge glow strip
    const strip=new THREE.Mesh(new THREE.BoxGeometry(0.06,wallH,SEG_LEN),new THREE.MeshPhongMaterial({color:T.tunnel,emissive:T.tunnel,emissiveIntensity:1.2}));
    strip.position.set(wx*0.97,wallH/2,-SEG_LEN/2);g.add(strip);
    // Mid strip
    const mstrip=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.04,SEG_LEN),new THREE.MeshPhongMaterial({color:T.accent,emissive:T.accent,emissiveIntensity:0.8}));
    mstrip.position.set(wx*0.97,wallH*0.5,-SEG_LEN/2);g.add(mstrip);
  });

  // Ceiling
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(9,SEG_LEN),new THREE.MeshPhongMaterial({color:new THREE.Color(T.floor).addScalar(0.01),emissive:new THREE.Color(T.accent).multiplyScalar(0.05)}));
  ceil.rotation.x=Math.PI/2;ceil.position.set(0,wallH,-SEG_LEN/2);g.add(ceil);
  // Ceiling strip
  const cStrip=new THREE.Mesh(new THREE.BoxGeometry(9,0.05,SEG_LEN),new THREE.MeshPhongMaterial({color:T.accent,emissive:T.accent,emissiveIntensity:0.4}));
  cStrip.position.set(0,wallH,-SEG_LEN/2);g.add(cStrip);

  // Arch rings — full torus
  for(let i=0;i<4;i++){
    const rz=-(SEG_LEN/(4+1))*(i+1);
    const ring=new THREE.Mesh(new THREE.TorusGeometry(4.7,0.06,10,40),new THREE.MeshPhongMaterial({color:T.tunnel,emissive:T.tunnel,emissiveIntensity:0.9}));
    ring.position.set(0,wallH/2,rz);g.add(ring);
    // Corner pillars
    [-4.4,4.4].forEach(px=>{
      const pil=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,wallH,8),new THREE.MeshPhongMaterial({color:T.tunnel,emissive:T.tunnel,emissiveIntensity:0.6}));
      pil.position.set(px,wallH/2,rz);g.add(pil);
    });
  }

  // Lights
  const tl=new THREE.PointLight(T.tunnel,0.9,22);tl.position.set(0,5,-SEG_LEN/2);g.add(tl);
  const al=new THREE.PointLight(T.accent,0.5,15);al.position.set(0,0.5,-SEG_LEN*0.75);g.add(al);

  g.position.z=z;scene.add(g);return g;
}

// Canvas-based procedural textures
const texCache={};
function makeGridTex(color){
  const k='grid'+color;if(texCache[k])return texCache[k];
  const cv=document.createElement('canvas');cv.width=256;cv.height=256;
  const ctx=cv.getContext('2d');
  const c=new THREE.Color(color);
  ctx.fillStyle=`rgb(${Math.floor(c.r*20)},${Math.floor(c.g*20)},${Math.floor(c.b*20)})`;
  ctx.fillRect(0,0,256,256);
  ctx.strokeStyle=`rgba(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)},0.25)`;
  ctx.lineWidth=1;
  for(let i=0;i<256;i+=32){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,256);ctx.stroke()}
  for(let i=0;i<256;i+=32){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(256,i);ctx.stroke()}
  const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,SEG_LEN/4);
  texCache[k]=t;return t;
}
function makeWallTex(color){
  const k='wall'+color;if(texCache[k])return texCache[k];
  const cv=document.createElement('canvas');cv.width=512;cv.height=256;
  const ctx=cv.getContext('2d');
  const c=new THREE.Color(color);
  ctx.fillStyle=`rgb(${Math.floor(c.r*15)},${Math.floor(c.g*15)},${Math.floor(c.b*15)})`;
  ctx.fillRect(0,0,512,256);
  // Hex pattern
  ctx.strokeStyle=`rgba(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)},0.2)`;
  ctx.lineWidth=1;
  const hw=50,hh=43;
  for(let row=-1;row<8;row++)for(let col=-1;col<12;col++){
    const x=col*hw*1.5+(row%2)*hw*0.75;
    const y=row*hh;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(x+hw/2*Math.cos(a),y+hh/2*Math.sin(a))}
    ctx.closePath();ctx.stroke();
  }
  const t=new THREE.CanvasTexture(cv);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(SEG_LEN/8,1);
  texCache[k]=t;return t;
}

// ─── OBSTACLES ───
const OBS_SHAPES=['left','right','center','double_lr','double_lc','double_rc','low','floating','drop'];
function spawnObs(){
  const T=THEME;
  const type=OBS_SHAPES[Math.floor(Math.random()*OBS_SHAPES.length)];
  const g=new THREE.Group();
  const obsColor=T.obs;
  const obsMat=()=>new THREE.MeshPhongMaterial({color:obsColor,emissive:obsColor,emissiveIntensity:0.5,shininess:160});

  let blockLanes=[];
  if(type==='left'){
    const m=new THREE.Mesh(new THREE.BoxGeometry(LANE_W,2,0.45),obsMat());
    m.position.set(LANES[0],1,0);g.add(m);blockLanes=[0];
    addObsGlow(g,obsColor,0,1.5,0);
  } else if(type==='right'){
    const m=new THREE.Mesh(new THREE.BoxGeometry(LANE_W,2,0.45),obsMat());
    m.position.set(LANES[2],1,0);g.add(m);blockLanes=[2];
    addObsGlow(g,obsColor,0,1.5,0);
  } else if(type==='center'){
    const m=new THREE.Mesh(new THREE.BoxGeometry(LANE_W,2,0.45),obsMat());
    m.position.set(LANES[1],1,0);g.add(m);blockLanes=[1];
    addObsGlow(g,obsColor,0,1.5,0);
  } else if(type==='double_lr'){
    [0,2].forEach(li=>{const m=new THREE.Mesh(new THREE.BoxGeometry(LANE_W,2,0.45),obsMat());m.position.set(LANES[li],1,0);g.add(m)});
    blockLanes=[0,2];addObsGlow(g,obsColor,0,1.5,0);
  } else if(type==='double_lc'){
    [0,1].forEach(li=>{const m=new THREE.Mesh(new THREE.BoxGeometry(LANE_W,2,0.45),obsMat());m.position.set(LANES[li],1,0);g.add(m)});
    blockLanes=[0,1];addObsGlow(g,obsColor,0,1.5,0);
  } else if(type==='double_rc'){
    [1,2].forEach(li=>{const m=new THREE.Mesh(new THREE.BoxGeometry(LANE_W,2,0.45),obsMat());m.position.set(LANES[li],1,0);g.add(m)});
    blockLanes=[1,2];addObsGlow(g,obsColor,0,1.5,0);
  } else if(type==='low'){
    const m=new THREE.Mesh(new THREE.BoxGeometry(LANE_W*3.4,0.28,0.4),new THREE.MeshPhongMaterial({color:T.accent,emissive:T.accent,emissiveIntensity:0.6}));
    m.position.set(0,0.9,0);g.add(m);
    g.userData.mustSlide=true;addObsGlow(g,T.accent,0,1,0);
  } else if(type==='floating'){
    const li=Math.floor(Math.random()*3);
    const fy=1.4+Math.random()*0.8;
    const m=new THREE.Mesh(new THREE.IcosahedronGeometry(0.42,1),new THREE.MeshPhongMaterial({color:T.accent,emissive:T.accent,emissiveIntensity:0.7,shininess:200}));
    m.position.set(LANES[li],fy,0);g.add(m);
    g.userData.floatY=fy;g.userData.floatLane=li;g.userData.floatSpd=2+Math.random();
    addObsGlow(g,T.accent,LANES[li],fy,0);
  } else if(type==='drop'){
    // Obstacle that drops from ceiling
    const li=Math.floor(Math.random()*3);
    const m=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,1.8,8),obsMat());
    m.position.set(LANES[li],5,0);g.add(m);
    g.userData.dropping=true;g.userData.dropLane=li;g.userData.dropVy=-8;
    addObsGlow(g,obsColor,LANES[li],3,0);
  }

  g.position.set(0,0,-55);
  g.userData.blockLanes=blockLanes;
  g.userData.type=type;
  scene.add(g);obstacles.push(g);
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;
    if(p.life<=0){scene.remove(p.m);particles.splice(i,1);continue}
    if(!p.ring){p.vel.y+=GRAVITY*0.28*dt;p.m.position.addScaledVector(p.vel,dt)}
    const t=p.life/p.max;
    p.m.material.opacity=t;
    if(p.ring)p.m.scale.setScalar(1+(1-t)*p.scale);
  }
}

// ─── TRAIL ───
function updateTrail(dt){
  const td=TRAILS.find(t=>t.id===S.trail);
  if(!td||td.id==='none')return;
  if(Math.random()<0.5){
    let col=td.color||0x00f0ff;
    if(td.id==='rainbow_t')col=new THREE.Color().setHSL(Math.random(),1,.6).getHex();
    const m=new THREE.Mesh(new THREE.SphereGeometry(.08+Math.random()*.06,6,4),new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:1.2,transparent:true}));
    m.position.copy(pGroup.position);
    m.position.x+=(Math.random()-.5)*.3;
    m.position.y+=Math.random()*.3;
    scene.add(m);
    const vel=new THREE.Vector3((Math.random()-.5)*.4,Math.random()*.6,.4+Math.random()*.4);
    trailPts.push({m,vel,life:.4,max:.4});
  }
  for(let i=trailPts.length-1;i>=0;i--){
    const p=trailPts[i];p.life-=dt;
    if(p.life<=0){scene.remove(p.m);trailPts.splice(i,1);continue}
    p.m.position.addScaledVector(p.vel,dt);
    p.m.material.opacity=(p.life/p.max)*.8;
  }
}

// ─── ABILITY SYSTEM ───
function useAbility(){
  if(!GAME.running||GAME.paused||!S.ability||!S.ownedAbilities.includes(S.ability))return;
  if(abilityCD>0){notify(`Cooldown: ${abilityCD.toFixed(1)}s`,'var(--c2)');return}
  const ab=ABILITIES.find(a=>a.id===S.ability);if(!ab)return;

  abilityCD=ab.cd;
  if(ab.id==='shield'){
    if(shieldUses<=0){shieldUses=3}
    notify('🛡️ SHIELD ACTIVE');
  } else if(ab.id==='magnet'){
    magnetOn=true;abilityTimer=ab.dur;notify('🧲 MAGNET ACTIVE');
  } else if(ab.id==='boost'){
    boostOn=true;abilityTimer=ab.dur;speed*=2.2;notify('⚡ HYPERDRIVE!');
  } else if(ab.id==='ghost'){
    ghostOn=true;abilityTimer=ab.dur;pBall.material.transparent=true;pBall.material.opacity=0.35;notify('👻 GHOST MODE');
  } else if(ab.id==='slow'){
    slowOn=true;abilityTimer=ab.dur;notify('⏱️ TIME WARP');
  } else if(ab.id==='doubler'){
    doublerOn=true;abilityTimer=ab.dur;notify('💰 COIN ×2');
  } else if(ab.id==='tiny'){
    tinyOn=true;abilityTimer=ab.dur;pGroup.scale.setScalar(0.5);notify('🔬 NANO MODE');
  }
  abilityActive=true;
  updateAbilityBar();
}

function updateAbility(dt){
  if(abilityCD>0)abilityCD=Math.max(0,abilityCD-dt);
  if(abilityActive&&abilityTimer>0){
    abilityTimer-=dt;
    if(abilityTimer<=0){
      // Deactivate
      magnetOn=false;ghostOn=false;slowOn=false;doublerOn=false;
      if(boostOn){speed/=2.2;boostOn=false}
      if(tinyOn){tinyOn=false;pGroup.scale.setScalar(1)}
      if(ghostOn){pBall.material.transparent=false;pBall.material.opacity=1}
      abilityActive=false;
    }
  }
  updateAbilityBar();
}

function updateAbilityBar(){
  const bar=document.getElementById('abBar');
  if(!S.ability||!S.ownedAbilities.includes(S.ability)){bar.innerHTML='';return}
  const ab=ABILITIES.find(a=>a.id===S.ability);if(!ab)return;
  const cdPct=abilityCD/ab.cd;
  bar.innerHTML=`<div class="ab-slot" style="border-color:${abilityActive?'var(--c3)':'var(--c1)'}44">
    <span>${ab.icon}</span>
    ${abilityCD>0?`<div class="ab-cd">${abilityCD.toFixed(0)}</div>`:''}
  </div>`;
}

// ─── THEME SWITCH ───
function switchTheme(){
  currentThemeIdx=(currentThemeIdx+1)%TUNNEL_THEMES.length;
  THEME=TUNNEL_THEMES[currentThemeIdx];
  // Rebuild tunnel with new theme
  segPool.forEach(s=>{scene.remove(s)});
  // Clear cached textures for new theme
  segPool=[];
  for(let i=0;i<SEG_N;i++)segPool.push(createSeg(-i*SEG_LEN+(Math.random()*2-1)));
  tunnelLight.color.setHex(THEME.tunnel);
  scene.fog.color.setHex(THEME.fog);
  scene.background.setHex(THEME.fog);
  document.getElementById('hTheme').textContent=THEME.name;
  setTimeout(()=>document.getElementById('hTheme').textContent='',2500);
}

// ─── GAME LOOP ───
let lastNow=0;
function gameLoop(now){
  if(!GAME.running)return;
  requestAnimationFrame(gameLoop);
  if(GAME.paused)return;
  const raw=(now-lastNow)/1000;
  lastNow=now;
  const dt=Math.min(raw,0.05);
  const t=now*0.001;
  const spMult=slowOn?0.4:1;

  // Score & speed
  dist+=speed*spMult*dt;
  score=Math.floor(dist);
  speed=Math.min(8+score*0.003,28);
  document.getElementById('hScore').textContent=score.toLocaleString();
  document.getElementById('hSpeed').textContent=`SPEED ×${(speed/8).toFixed(1)}`;

  // Theme change
  themeChangeTimer+=dt;
  if(S.settings.theme==='auto'&&themeChangeTimer>=THEME_CHANGE_INTERVAL){
    themeChangeTimer=0;switchTheme();
  }

  // Invincible blink
  if(invincible){
    invTimer-=dt;
    if(invTimer<=0){invincible=false;pGroup.visible=true}
    else pGroup.visible=Math.floor(t*10)%2===0;
  }

  // Rainbow skin pulse
  const skin=getSkinDef();
  if(skin.id==='rainbow'&&pBall){
    const h=(t*0.25)%1;
    pBall.material.color.setHSL(h,1,.55);
    pGlow.color.setHSL(h,1,.6);
    pRing.material.color.setHSL(h,1,.6);pRing.material.emissive.setHSL(h,1,.6);
    pCore.material.color.setHSL(h,1,.6);pCore.material.emissive.setHSL(h,1,.6);
  }

  // Smooth lane movement
  const tx=LANES[pLane];
  pGroup.position.x+=(tx-pGroup.position.x)*Math.min(dt*14,1);

  // Jump physics
  if(jumping){
    jumpVy+=GRAVITY*dt;
    pY+=jumpVy*dt;
    if(pY<=0){pY=0;jumping=false;jumpVy=0}
  }

  // Slide
  if(sliding){
    slideT-=dt;
    pGroup.scale.y=0.45;
    pGroup.position.y=0.2;
    if(slideT<=0){sliding=false;pGroup.scale.y=1}
  } else {
    pGroup.position.y=0.55+pY;
  }

  // Spin the ball
  if(pBall){
    pBall.rotation.x+=speed*dt*0.3;
    pBall.rotation.z+=dt*0.5;
  }
  if(pRing)pRing.rotation.z+=dt*1.5;
  const r2=pGroup.getObjectByName('ring2');
  if(r2)r2.rotation.y+=dt*2;

  // Camera
  if(shakeT>0){
    shakeT-=dt;const si=shakeI*(shakeT/0.4);
    camera.position.x=(Math.random()-.5)*si;
    camera.position.y=2.8+(Math.random()-.5)*si;
  } else {
    camera.position.x+=(0-camera.position.x)*dt*10;
    camera.position.y+=(2.8-camera.position.y)*dt*10;
  }
  camera.position.z=5.5;
  camera.lookAt(pGroup.position.x*.3,0.8,0);

  updateAbility(dt);
  updateTunnel(speed*spMult*dt);
  updateObs(dt,t,spMult);
  updateCols(dt,t,spMult);
  updateParticles(dt);
  updateTrail(dt);

  renderer.render(scene,camera);
}

function updateTunnel(moveZ){
  segPool.forEach(seg=>{
    seg.position.z+=moveZ;
    if(seg.position.z>SEG_LEN){
      seg.position.z-=SEG_N*SEG_LEN;
    }
  });
}

function updateObs(dt,t,spMult){
  obsTimer-=dt;
  if(obsTimer<=0){
    spawnObs();
    obsTimer=Math.max(0.75,2.4-score*0.00025);
  }
  for(let i=obstacles.length-1;i>=0;i--){
    const ob=obstacles[i];
    ob.position.z+=speed*spMult*dt;

    // Drop animation
    if(ob.userData.dropping){
      ob.userData.dropVy=(ob.userData.dropVy||0)-10*dt;
      ob.children[0].position.y+=ob.userData.dropVy*dt;
      if(ob.children[0].position.y<=0.9){ob.children[0].position.y=0.9;ob.userData.dropping=false;ob.userData.blockLanes=[ob.userData.dropLane]}
    }
    // Float animation
    if(ob.userData.floatY!==undefined){
      ob.children[0].position.y=ob.userData.floatY+Math.sin(t*ob.userData.floatSpd)*0.35;
      ob.children[0].rotation.y+=dt*2;ob.children[0].rotation.x+=dt*1.3;
    }

    // Collision check — use range rather than single frame snap
    if(!invincible&&!ghostOn&&ob.position.z>-2.5&&ob.position.z<2){
      const px=pGroup.position.x;
      const py=pGroup.position.y;
      let hit=false;
      if(ob.userData.mustSlide){
        // Low bar: hit unless sliding
        const barY=ob.children[0].position.y;
        if(!sliding&&py+0.55>barY-0.15)hit=true;
      } else if(ob.userData.blockLanes?.includes(pLane)&&!ob.userData.dropping){
        // Wall: hit if on ground level
        if(py<0.3)hit=true;
      } else if(ob.userData.floatY!==undefined){
        // Floating obstacle exact distance check
        const fp=ob.children[0].position;
        const dx=Math.abs(px-(ob.position.x+fp.x));
        const dy=Math.abs(py+0.5-fp.y);
        if(dx<0.9&&dy<0.9)hit=true;
      }
      if(hit&&!ob.userData.hit){ob.userData.hit=true;takeDamage()}
    }

    if(ob.position.z>10){scene.remove(ob);obstacles.splice(i,1)}
  }
}

function updateCols(dt,t,spMult){
  colTimer-=dt;
  if(colTimer<=0){
    const n=2+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++)setTimeout(spawnCol,i*100);
    colTimer=1.0;
  }
  for(let i=collectibles.length-1;i>=0;i--){
    const col=collectibles[i];
    col.m.position.z+=speed*spMult*dt;
    col.pl.position.z+=speed*spMult*dt;
    col.spin+=dt*3.5;
    col.m.rotation.y=col.spin;col.m.rotation.x=col.spin*.5;

    // Magnet pull
    if(magnetOn){
      const dx=LANES[pLane]-col.m.position.x;
      col.m.position.x+=dx*dt*7;
      col.pl.position.x=col.m.position.x;
    }

    // Collect
    const d=col.m.position.distanceTo(new THREE.Vector3(LANES[pLane],pGroup.position.y+.5,0));
    if(col.m.position.z>-2.5&&d<1.0){
      spawnCoinFX(col.m.position);
      scene.remove(col.m);scene.remove(col.pl);
      collectibles.splice(i,1);
      const earned=doublerOn?2:1;
      runCoins+=earned;S.coins+=earned;
      document.getElementById('hCoins').textContent=`⚡ ${S.coins}`;
      continue;
    }
    if(col.m.position.z>10){scene.remove(col.m);scene.remove(col.pl);collectibles.splice(i,1)}
  }
}

// ─── PLAYER ACTIONS ───
function moveLane(d){
  if(!GAME.running||GAME.paused)return;
  const nl=Math.max(0,Math.min(2,pLane+d));
  pLane=nl;
}
function doJump(){
  if(!GAME.running||GAME.paused||GAME.over)return;
  if(!jumping&&!sliding){jumping=true;jumpVy=JUMP_F}
  else if(jumping&&jumpVy>0){jumpVy=JUMP_F*.72} // double jump
}
function doSlide(){
  if(!GAME.running||GAME.paused||GAME.over||jumping)return;
  if(!sliding){sliding=true;slideT=0.65}
}

function takeDamage(){
  if(invincible||ghostOn)return;
  if(shieldUses>0){shieldUses--;spawnShieldFX();notify(`🛡️ SHIELD (${shieldUses} left)`,'var(--c3)');return}
  lives--;invincible=true;invTimer=1.8;
  spawnHitFX();
  if(S.settings.shake!==false){shakeT=0.45;shakeI=0.35}
  updateHUD();
  if(lives<=0)endGame();
}

function updateHUD(){
  const h=['','❤️','❤️❤️','❤️❤️❤️'];
  document.getElementById('hLives').textContent=h[Math.max(0,lives)]||'💀';
  document.getElementById('hCoins').textContent=`⚡ ${S.coins}`;
}

async function endGame(){
  GAME.running=false;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('mctrl').classList.remove('on');
  if(score>S.best)S.best=score;
  wS();await submitScore(S.nickname,score);
  document.getElementById('goVal').textContent=score.toLocaleString();
  document.getElementById('goBest').textContent=score>=S.best?'🏆 New Personal Best!':'Best: '+S.best.toLocaleString();
  document.getElementById('goCoins').textContent='+'+runCoins;
  document.getElementById('gc').style.display='none';
  showScreen('goScreen');
}

function togglePause(){
  if(!GAME.running)return;
  GAME.paused=!GAME.paused;
  if(GAME.paused){renderKB('kbList');ptab('game');document.getElementById('pauseScreen').classList.remove('hidden')}
  else{document.getElementById('pauseScreen').classList.add('hidden');lastNow=performance.now()}
}
function resumeGame(){
  if(!GAME.paused)return;
  GAME.paused=false;
  document.getElementById('pauseScreen').classList.add('hidden');
  lastNow=performance.now();
}
function quitMenu(){
  GAME.running=false;GAME.paused=false;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('mctrl').classList.remove('on');
  document.getElementById('gc').style.display='none';
  wS();showScreen('mainMenu');
  initMenuBg();
}

// Mobile
function setupMobile(){
  const press=(a)=>{if(a==='l')moveLane(-1);if(a==='r')moveLane(1);if(a==='j')doJump();if(a==='s')doSlide()};
  [['mcL','l'],['mcR','r'],['mcJ','j'],['mcS','s']].forEach(([id,a])=>{
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();press(a)},{passive:false});
  });
}

// Resize
window.addEventListener('resize',()=>{
  if(renderer&&GAME.running){renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix()}
  if(menuRenderer&&!GAME.running){menuRenderer.setSize(window.innerWidth,window.innerHeight);menuCamera.aspect=window.innerWidth/window.innerHeight;menuCamera.updateProjectionMatrix()}
});

// ─── INIT ───
document.getElementById('nnInput').value=S.nickname||'';
initMenuBg();
showScreen('mainMenu');

console.log('%c🚀 VOID RUNNER v2 — Enhanced','color:#00f0ff;font-family:monospace;font-size:14px');
</script>
